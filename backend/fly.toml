# fly launch --config fly.toml --no-deploy
app = 'onesec-diplom-api'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '4000'
  DATABASE_URL = 'file:/app/prisma/dev.db'
  COOKIE_SECURE = 'true'
  NODE_ENV = 'production'

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/health'

[[mounts]]
  source = 'onesec_data'
  destination = '/app/prisma'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
