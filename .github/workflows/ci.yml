name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: |
          cat > .env <<'EOF'
          PORT=4000
          DATABASE_URL=file:./prisma/dev.db
          JWT_ACCESS_SECRET=ci-test-access-secret-min-32-characters-long
          JWT_REFRESH_SECRET=ci-test-refresh-secret-min-32-characters-long
          COOKIE_SECURE=false
          FRONTEND_URL=http://localhost:3000
          PAYMENT_WEBHOOK_SECRET=ci-webhook-secret
          EOF
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run db:seed
      - run: npm test
      - run: npm run lint

  frontend:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: echo 'BACKEND_URL=http://localhost:4000' > .env.local
      - run: npm run lint
      - run: npm test
      - run: npm run build
