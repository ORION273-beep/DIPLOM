name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: |
          cat > .env <<'EOF'
          PORT=4000
          MONGODB_URI=mongodb://127.0.0.1:27017/onesec
          JWT_ACCESS_SECRET=ci-test-access-secret-min-32-characters-long
          JWT_REFRESH_SECRET=ci-test-refresh-secret-min-32-characters-long
          COOKIE_SECURE=false
          FRONTEND_URL=http://localhost:5173
          PAYMENT_WEBHOOK_SECRET=ci-webhook-secret
          EOF
      - run: npm test
      - run: npm run lint

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
