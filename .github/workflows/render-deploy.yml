name: Render Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'render.yaml'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.ts'
      - 'src/**'
      - '.github/workflows/render-deploy.yml'

jobs:
  deploy-web:
    if: ${{ secrets.RENDER_DEPLOY_HOOK_WEB != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render web deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}"

  deploy-api:
    if: ${{ secrets.RENDER_DEPLOY_HOOK_API != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render API deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"
