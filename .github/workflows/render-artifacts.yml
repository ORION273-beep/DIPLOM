name: Update Render Web Artifacts

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend/.render/**'
      - 'README.md'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: BACKEND_URL=http://127.0.0.1:4001 npm run render-build
      - run: |
          rm -rf backend/.render/web
          mkdir -p backend/.render
          cp -r .next/standalone backend/.render/web

      - name: Commit artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf .render 2>/dev/null || true
          git add backend/.render/web
          if git diff --staged --quiet; then
            echo "No artifact changes."
            exit 0
          fi
          git commit -m "Update Render web artifacts [skip ci]"
          git push
