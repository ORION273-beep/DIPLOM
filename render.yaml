# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: orion-diplom-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/app/prisma/dev.db
      - key: COOKIE_SECURE
        value: 'true'
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: PAYMENT_WEBHOOK_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://orion-diplom-api.onrender.com
      - key: HOSTNAME
        value: 0.0.0.0
