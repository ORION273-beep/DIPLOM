# HTTP-only config — use for first deploy and local testing.
# After obtaining TLS certs, switch to default.https.conf (see docs/DEPLOY.md).

server {
    listen 80;
    server_name _;

    # Docker embedded DNS — avoids "host not found" when nginx starts before upstream
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 10M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        set $upstream_frontend frontend;
        proxy_pass http://$upstream_frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
